name: Deploy to Server

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # 代码检查和测试
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run type check
        run: npm run type:check

      - name: Run tests
        run: npm test

  # 构建前端
  build-client:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build client
        run: npm run build:client

      - name: Upload client build
        uses: actions/upload-artifact@v4
        with:
          name: client-build
          path: dist/client
          retention-days: 7

  # 构建后端
  build-server:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build server
        run: npm run build:server

      - name: Upload server build
        uses: actions/upload-artifact@v4
        with:
          name: server-build
          path: |
            dist/server
            package.json
            package-lock.json
          retention-days: 7

  # 部署到服务器
  deploy:
    runs-on: ubuntu-latest
    needs: [build-client, build-server]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download client build
        uses: actions/download-artifact@v4
        with:
          name: client-build
          path: dist/client

      - name: Download server build
        uses: actions/download-artifact@v4
        with:
          name: server-build
          path: dist

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          port: 22
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            
            # 备份当前版本
            if [ -d "dist" ]; then
              mv dist dist_backup_$(date +%Y%m%d_%H%M%S)
            fi
            
            # 创建目录
            mkdir -p dist

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          port: 22
          source: "dist/*"
          target: "${{ secrets.DEPLOY_PATH }}"
          strip_components: 0

      - name: Restart application
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          port: 22
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            
            # 安装生产依赖
            npm ci --production
            
            # 使用 PM2 重启应用
            if pm2 list | grep -q "jianchengyun"; then
              pm2 reload jianchengyun
            else
              pm2 start main.js --name jianchengyun
            fi
            
            # 保存 PM2 配置
            pm2 save

  # 部署到 Vercel (可选 - 前端静态托管)
  deploy-vercel:
    runs-on: ubuntu-latest
    needs: build-client
    if: github.ref == 'refs/heads/main' && false  # 设置为 true 启用
    steps:
      - name: Download client build
        uses: actions/download-artifact@v4
        with:
          name: client-build
          path: dist

      - name: Deploy to Vercel
        uses: vercel/action-deploy@v1
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./dist
