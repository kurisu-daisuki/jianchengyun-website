name: Deploy to Aliyun OSS

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          CI: true

      - name: Build static site
        run: npm run build:oss
        env:
          NODE_ENV: production
          CI: true

      - name: Setup aliyun ossutil
        uses: manyuanrong/setup-ossutil@v3
        with:
          endpoint: ${{ secrets.OSS_ENDPOINT }}
          access-key-id: ${{ secrets.OSS_KEY_ID }}
          access-key-secret: ${{ secrets.OSS_KEY_SECRET }}

      - name: Deploy to OSS
        run: |
          LOCAL_BUILD_PATH="dist/client"
          TARGET_BUCKET="${{ secrets.OSS_BUCKET }}"

          if [ ! -d "$LOCAL_BUILD_PATH" ]; then
            echo "❌ 构建产物不存在: $LOCAL_BUILD_PATH"
            exit 1
          fi

          echo "📦 上传 JS/CSS/图片（长期缓存）..."
          ossutil cp -r "$LOCAL_BUILD_PATH/" "$TARGET_BUCKET" \
            --update \
            --meta "Cache-Control:public,max-age=31536000,immutable" \
            --include "*.js" --include "*.css" --include "*.svg" --include "*.png" --include "*.jpg" --include "*.webp" --include "*.ico"

          echo "📄 上传 HTML（不缓存）..."
          ossutil cp -r "$LOCAL_BUILD_PATH/" "$TARGET_BUCKET" \
            --update \
            --meta "Cache-Control:no-cache" \
            --include "*.html"

          echo "✅ 部署完成 → $TARGET_BUCKET"
