# ============================================================
# 🚀 湖南建诚云 - OSS 自动部署工作流
# ============================================================
# 触发条件：推送到 main 分支
# 需要配置的 GitHub Secrets:
#   - OSS_ENDPOINT: OSS Bucket 地址（如 oss-cn-shenzhen.aliyuncs.com）
#   - OSS_ACCESS_KEY_ID: 阿里云 AccessKey ID
#   - OSS_ACCESS_KEY_SECRET: 阿里云 AccessKey Secret
#   - OSS_BUCKET: OSS Bucket 名称（如 jianchengyun）
# ============================================================
name: 🚀 部署到 OSS

on:
  push:
    branches: [main, master]
  workflow_dispatch: # 支持手动触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ==========================================
      # 1. 检出代码
      # ==========================================
      - name: 📥 检出代码
        uses: actions/checkout@v4

      # ==========================================
      # 2. 设置 Node.js 环境
      # ==========================================
      - name: 🔧 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # ==========================================
      # 3. 安装依赖
      # ==========================================
      - name: 📦 安装依赖
        run: npm ci

      # ==========================================
      # 4. 构建前端静态文件
      # ==========================================
      - name: 🔨 构建前端
        run: npm run build:oss
        env:
          NODE_ENV: production

      # ==========================================
      # 5. 安装并配置 ossutil
      # ==========================================
      - name: ⚙️ 配置 ossutil
        run: |
          curl -L https://gosspublic.alicdn.com/ossutil/1.7.19/ossutil-v1.7.19-linux-amd64.zip -o /tmp/ossutil.zip
          sudo unzip -o /tmp/ossutil.zip -d /tmp/ossutil-bin/
          sudo cp /tmp/ossutil-bin/ossutil-v1.7.19-linux-amd64/ossutil64 /usr/local/bin/ossutil
          sudo chmod +x /usr/local/bin/ossutil
          ossutil config -e ${{ secrets.OSS_ENDPOINT }} -i ${{ secrets.OSS_KEY_ID }} -k ${{ secrets.OSS_KEY_SECRET }}

      # ==========================================
      # 6. 部署到 OSS
      # ==========================================
      - name: 🚀 部署到 OSS
        run: bash ./scripts/deploy-oss.sh
        env:
          OSS_BUCKET: ${{ secrets.OSS_BUCKET || 'hnjcyun-web' }}
          OSS_REGION: ${{ secrets.OSS_REGION || 'oss-cn-guangzhou' }}

      # ==========================================
      # 7. 刷新 CDN 缓存（可选，如果配置了 CDN）
      # ==========================================
      # - name: 🔄 刷新 CDN 缓存
      #   run: |
      #     # 如果你使用了阿里云 CDN，取消注释以下代码
      #     # aliyun cdn RefreshObjectCaches --ObjectPath https://your-domain.com/ --ObjectType Directory
